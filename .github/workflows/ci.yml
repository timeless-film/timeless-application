name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Typecheck, lint, and unit tests — no database required
  # ─────────────────────────────────────────────────────────────────────────────
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

  # ─────────────────────────────────────────────────────────────────────────────
  # E2E tests — requires PostgreSQL for Better Auth + Drizzle
  # ─────────────────────────────────────────────────────────────────────────────
  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: quality

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: timeless
          POSTGRES_PASSWORD: timeless_ci
          POSTGRES_DB: timeless_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U timeless"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://timeless:timeless_ci@localhost:5432/timeless_test
      NEXT_PUBLIC_APP_URL: http://localhost:3099
      BETTER_AUTH_SECRET: ci-test-secret-do-not-use-in-production
      BETTER_AUTH_URL: http://localhost:3099
      STRIPE_SECRET_KEY: sk_test_fake_ci_key
      STRIPE_WEBHOOK_SECRET: whsec_fake_ci_key
      CUSTOMERIO_SITE_ID: fake_ci
      CUSTOMERIO_API_KEY: fake_ci
      CUSTOMERIO_APP_API_KEY: fake_ci
      TMDB_API_KEY: fake_ci
      CI: true

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Push database schema
        run: npx drizzle-kit push

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
