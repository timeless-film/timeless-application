name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Typecheck, lint, and unit tests — no database required
  # ─────────────────────────────────────────────────────────────────────────────
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Drizzle snapshot integrity
        run: |
          JOURNAL="drizzle/meta/_journal.json"
          MISSING=""
          for idx in $(node -e "const j=require('./$JOURNAL'); j.entries.forEach(e => console.log(e.idx.toString().padStart(4,'0')))"); do
            if [ ! -f "drizzle/meta/${idx}_snapshot.json" ]; then
              MISSING="${MISSING} ${idx}"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "❌ Missing Drizzle snapshot file(s):${MISSING}"
            echo "   Every migration in _journal.json must have a matching snapshot."
            exit 1
          fi
          echo "✅ Drizzle snapshots are complete."

      - name: Check Drizzle migrations
        # drizzle-kit generate reads schema files + snapshots — no DB connection needed.
        # A placeholder DATABASE_URL satisfies the config loader.
        # If the schema has changed without a matching migration, new files appear
        # in drizzle/ and git diff exits non-zero, failing the build.
        run: |
          DATABASE_URL="postgresql://localhost/placeholder" pnpm exec drizzle-kit generate </dev/null 2>&1
          if ! git diff --quiet -- drizzle/ || git ls-files --others --exclude-standard -- drizzle/ | grep -q .; then
            echo ""
            echo "❌ Schema changes detected without a corresponding Drizzle migration."
            echo "   Run 'pnpm db:generate', commit the generated files, and push again."
            echo ""
            git diff -- drizzle/
            exit 1
          fi
          echo "✅ Drizzle migrations are up to date."

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

  # ─────────────────────────────────────────────────────────────────────────────
  # E2E tests — requires PostgreSQL for Better Auth + Drizzle
  # ─────────────────────────────────────────────────────────────────────────────
  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: quality

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: timeless
          POSTGRES_PASSWORD: timeless_ci
          POSTGRES_DB: timeless_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U timeless -d timeless_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://timeless:timeless_ci@localhost:5432/timeless_test
      NEXT_PUBLIC_APP_URL: http://localhost:3099
      BETTER_AUTH_SECRET: ci-test-secret-do-not-use-in-production
      BETTER_AUTH_URL: http://localhost:3099
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY || 'sk_test_fake_ci_key' }}
      STRIPE_WEBHOOK_SECRET: whsec_test_e2e_secret
      TMDB_API_KEY: fake_ci
      CI: true

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Stripe CLI
        run: |
          curl -s https://packages.stripe.dev/api/security/keypair/stripe-cli-gpg/public | gpg --dearmor | sudo tee /usr/share/keyrings/stripe.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/stripe.gpg] https://packages.stripe.dev/stripe-cli-debian-local stable main" | sudo tee /etc/apt/sources.list.d/stripe.list
          sudo apt-get update && sudo apt-get install -y stripe

      - name: Start Stripe CLI listener
        if: ${{ env.STRIPE_SECRET_KEY != 'sk_test_fake_ci_key' }}
        run: |
          stripe listen \
            --forward-to http://localhost:3099/api/webhooks/stripe \
            --api-key "$STRIPE_SECRET_KEY" \
            --skip-verify &
          sleep 3

      - name: Push database schema
        run: npx drizzle-kit push

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
